<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Script - lokus hub</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;line-height:1.6}.container{max-width:1200px;margin:0 auto;padding:20px}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:15px;border-bottom:1px solid #2a2a2a}.logo{font-size:1.5rem;font-weight:bold;color:#00f2ea;text-decoration:none}.nav{display:flex;gap:20px}.nav a{color:#aaa;text-decoration:none}.nav a:hover{color:#00f2ea}.script-container{display:grid;grid-template-columns:2.5fr 1fr;gap:25px}@media (max-width:900px){.script-container{grid-template-columns:1fr}}.script-main{background:#1a1a1a;border-radius:12px;padding:25px;border:1px solid #2a2a2a}.script-header{display:flex;gap:20px;margin-bottom:25px;flex-wrap:wrap}.script-icon{width:80px;height:80px;border-radius:12px;object-fit:cover;background:#2a2a2a}.script-info{flex:1}.script-title{font-size:1.8rem;color:#00f2ea;margin-bottom:10px}.script-meta{display:flex;gap:20px;color:#888;font-size:.9rem;flex-wrap:wrap}.author-section{display:flex;align-items:center;gap:15px;margin:20px 0;padding:15px;background:#222;border-radius:50px}.author-avatar{width:45px;height:45px;border-radius:50%;object-fit:cover}.author-name{font-weight:bold;color:#00f2ea}.author-stats{color:#888;font-size:.8rem}.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:25px 0}.stat-card{background:#222;padding:15px;border-radius:10px;text-align:center}.stat-value{font-size:1.3rem;font-weight:bold;color:#00f2ea}.stat-label{color:#888;font-size:.7rem;text-transform:uppercase}.action-buttons{display:flex;gap:15px;margin:25px 0;flex-wrap:wrap}.copy-btn{background:#00f2ea;color:#000;border:none;padding:15px 30px;border-radius:50px;font-weight:bold;cursor:pointer;flex:2;font-size:1rem}.copy-btn:hover{background:#00d4cc}.favorite-btn{background:#222;color:#ffaa00;border:2px solid #ffaa00;padding:15px;border-radius:50px;font-weight:bold;cursor:pointer;flex:1}.favorite-btn:hover{background:#ffaa0020}.report-btn{background:#222;color:#ff4444;border:2px solid #ff4444;padding:15px;border-radius:50px;font-weight:bold;cursor:pointer;flex:1}.game-links{display:flex;gap:15px;margin:20px 0}.game-link{background:#222;color:#fff;padding:12px 25px;border-radius:50px;text-decoration:none;border:1px solid #3a3a3a}.game-link:hover{border-color:#00f2ea}.section-title{font-size:1.2rem;color:#00f2ea;margin:25px 0 15px}.description-box{background:#222;border-radius:12px;padding:20px;margin:20px 0;border-left:4px solid #00f2ea}.description-content{color:#aaa;line-height:1.8;white-space:pre-wrap}.features-list{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0}.feature-tag{background:#1a2a2a;color:#9cfff8;padding:6px 14px;border-radius:30px;font-size:.8rem;border:1px solid #00f2ea40}.code-box{background:#222;border-radius:12px;padding:20px;margin:25px 0;border:1px solid #3a3a3a}.code-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.code-title{display:flex;align-items:center;gap:8px}.code-content{background:#0a0a0a;padding:20px;border-radius:8px;color:#c5fffb;font-family:'Courier New',monospace;font-size:.9rem;overflow-x:auto;border:1px solid #2e2e2e;white-space:pre-wrap;word-break:break-all}.changelog-box{background:#222;border-radius:12px;padding:20px;margin:20px 0}.changelog-item{padding:12px;border-bottom:1px solid #2a2a2a;color:#aaa}.changelog-item:last-child{border-bottom:none}.sidebar{background:#1a1a1a;border-radius:12px;padding:25px;border:1px solid #2a2a2a}.sidebar-section{margin-bottom:30px}.sidebar-title{color:#00f2ea;font-size:1.1rem;margin-bottom:15px;padding-bottom:8px;border-bottom:1px solid #2a2a2a}.stat-row{display:flex;justify-content:space-between;padding:8px 0;color:#aaa}.stat-row span:first-child{color:#888}.related-script{display:flex;gap:12px;padding:12px;border-bottom:1px solid #2a2a2a;cursor:pointer}.related-script:hover{background:#222}.related-script img{width:40px;height:40px;border-radius:8px;object-fit:cover}.related-info{flex:1}.related-name{color:#00f2ea;margin-bottom:4px}.related-meta{color:#888;font-size:.7rem}.back-btn{display:inline-block;margin-bottom:20px;color:#00f2ea;text-decoration:none}.back-btn:hover{text-decoration:underline}.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#00f2ea;color:#000;padding:12px 30px;border-radius:50px;z-index:9999;display:none;font-weight:bold}.toast.show{display:block;animation:slideUp .3s,fadeOut .3s 2s forwards}.blurred-notice{background:#ffaa0020;border:1px solid #ffaa00;border-radius:8px;padding:15px;margin:20px 0;color:#ffaa00;text-align:center}@keyframes slideUp{from{bottom:-50px}to{bottom:30px}}@keyframes fadeOut{to{opacity:0}}.loading{text-align:center;padding:60px}.loading-spinner{width:50px;height:50px;border:3px solid #2a2a2a;border-top-color:#00f2ea;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}@keyframes spin{to{transform:rotate(360deg)}}
</style></head><body>
<div class="container">
  <div class="header">
    <a href="/" class="logo">lokus hub</a>
    <div class="nav">
      <a href="/">Browse Scripts</a>
      <a href="/upload.html">Upload</a>
      <a href="/admin.html">Admin</a>
    </div>
  </div>

  <a href="/" class="back-btn">← Back to scripts</a>
  
  <div class="script-container" id="scriptContent">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div style="color:#00f2ea">Loading script...</div>
      <div style="color:#888; margin-top:10px; font-size:.8rem" id="debugInfo"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">📋 Copied!</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const scriptId = urlParams.get('id');
let currentScript = null;
let user = JSON.parse(localStorage.getItem('user') || '{"id":"guest_"+Date.now(),"favorites":[]}');
let allScripts = [];

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function timeAgo(date) {
  const seconds = Math.floor((new Date() - new Date(date)) / 1000);
  const intervals = {
    year: 31536000, month: 2592000, week: 604800, day: 86400,
    hour: 3600, minute: 60
  };
  for (let [unit, secondsInUnit] of Object.entries(intervals)) {
    const interval = Math.floor(seconds / secondsInUnit);
    if (interval >= 1) return interval + ' ' + unit + (interval === 1 ? '' : 's') + ' ago';
  }
  return 'just now';
}

async function loadScript() {
  const debugInfo = document.getElementById('debugInfo');
  
  try {
    if (!scriptId) {
      window.location.href = '/';
      return;
    }
    
    debugInfo.textContent = 'Fetching scripts...';
    const res = await fetch('/scripts.json?t=' + Date.now());
    
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    
    const rawText = await res.text();
    let data;
    
    try {
      data = JSON.parse(rawText);
    } catch (e) {
      console.error('JSON parse error:', e);
      throw new Error('Invalid JSON format');
    }
    
    // Handle both array and object formats
    if (data.scripts && Array.isArray(data.scripts)) {
      allScripts = data.scripts;
    } else if (Array.isArray(data)) {
      allScripts = data;
    } else {
      throw new Error('No scripts found');
    }
    
    currentScript = allScripts.find(s => s && s.id === scriptId);
    
    if (!currentScript) {
      throw new Error('Script not found');
    }
    
    document.title = `${currentScript.name} - lokus hub`;
    currentScript.views = (currentScript.views || 0) + 1;
    
    // Get related scripts (same game)
    const relatedScripts = allScripts
      .filter(s => s.id !== currentScript.id && s.game === currentScript.game)
      .slice(0, 3);
    
    renderScript(currentScript, relatedScripts);
    
  } catch (error) {
    document.getElementById('scriptContent').innerHTML = `
      <div style="text-align:center; padding:60px; background:#1a1a1a; border-radius:12px;">
        <div style="font-size:48px; margin-bottom:20px;">❌</div>
        <h2 style="color:#ff4444; margin-bottom:10px;">${escapeHtml(error.message)}</h2>
        <p style="color:#888; margin-bottom:20px;">Script ID: ${escapeHtml(scriptId || 'none')}</p>
        <a href="/" style="background:#00f2ea; color:#000; padding:12px 30px; border-radius:50px; text-decoration:none;">← Back to Home</a>
      </div>
    `;
  }
}

function renderScript(script, related) {
  const isFavorited = user.favorites?.includes(script.id);
  const gameLink = script.universeId ? `https://www.roblox.com/games/${script.universeId}` : '#';
  
  // Features
  const features = script.features?.length ? 
    `<div class="features-list">${script.features.map(f => `<span class="feature-tag">${escapeHtml(f)}</span>`).join('')}</div>` : '';
  
  // Screenshots
  const screenshots = script.screenshots?.length ?
    `<div style="display:flex; gap:15px; overflow-x:auto; padding:10px 0; margin:20px 0;">
      ${script.screenshots.map(s => `<img src="${escapeHtml(s)}" style="width:200px; height:120px; border-radius:8px; object-fit:cover; cursor:pointer;" onclick="window.open(this.src)">`).join('')}
    </div>` : '';
  
  // Changelog
  const changelog = script.changelog?.length ?
    `<div class="changelog-box">
      <div class="section-title">📋 Changelog</div>
      ${script.changelog.map(c => `<div class="changelog-item">${escapeHtml(c)}</div>`).join('')}
    </div>` : '';
  
  // Related scripts
  const relatedHTML = related.length ?
    related.map(r => `
      <div class="related-script" onclick="window.location.href='/script.html?id=${r.id}'">
        <img src="${r.image || 'https://via.placeholder.com/40'}" onerror="this.src='https://via.placeholder.com/40'">
        <div class="related-info">
          <div class="related-name">${escapeHtml(r.name)}</div>
          <div class="related-meta">${r.downloads || 0} downloads · ${r.views || 0} views</div>
        </div>
      </div>
    `).join('') : '<div style="color:#888; padding:12px;">No related scripts</div>';
  
  document.getElementById('scriptContent').innerHTML = `
    <div class="script-main">
      <div class="script-header">
        <img class="script-icon" src="${script.image || 'https://via.placeholder.com/80'}" alt="icon" onerror="this.src='https://via.placeholder.com/80'">
        <div class="script-info">
          <h1 class="script-title">${escapeHtml(script.name)}</h1>
          <div class="script-meta">
            <span>🎮 ${escapeHtml(script.game || 'Unknown')}</span>
            <span>📦 v${escapeHtml(script.version || '1.0.0')}</span>
            <span>🕒 ${script.date ? timeAgo(script.date) : 'Recently'}</span>
            <span>👁️ ${script.views || 0} views</span>
          </div>
        </div>
      </div>
      
      ${script.blurred ? '<div class="blurred-notice">🔒 This script requires verification on the home page to unlock</div>' : ''}
      
      <div class="author-section">
        <img class="author-avatar" src="${script.authorAvatar || 'https://via.placeholder.com/45'}" onerror="this.src='https://via.placeholder.com/45'">
        <div>
          <div class="author-name">${escapeHtml(script.author || 'Anonymous')}</div>
          <div class="author-stats">${script.authorScripts || 0} scripts · ${script.authorRep || 0} reputation</div>
        </div>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${script.downloads || 0}</div><div class="stat-label">Downloads</div></div>
        <div class="stat-card"><div class="stat-value">${script.favorites || 0}</div><div class="stat-label">Favorites</div></div>
        <div class="stat-card"><div class="stat-value">${script.views || 0}</div><div class="stat-label">Views</div></div>
        <div class="stat-card"><div class="stat-value">${script.likes || 0}</div><div class="stat-label">Likes</div></div>
      </div>
      
      <div class="action-buttons">
        <button class="copy-btn" onclick="copyScript()" ${script.blurred ? 'disabled' : ''}>📋 Copy Script</button>
        <button class="favorite-btn" onclick="toggleFavorite()">${isFavorited ? '★ Favorited' : '☆ Favorite'}</button>
        <button class="report-btn" onclick="reportScript()">⚠️ Report</button>
      </div>
      
      <div class="game-links">
        <a href="${gameLink}" target="_blank" class="game-link">🎮 Play Game</a>
        <a href="#" onclick="copyScript(); return false;" class="game-link">⚡ Direct Execute</a>
      </div>
      
      <div class="section-title">📝 Description</div>
      <div class="description-box">
        <div class="description-content">${escapeHtml(script.longDescription || script.description || 'No description provided.')}</div>
      </div>
      
      ${features}
      
      ${screenshots}
      
      <div class="section-title">💻 Loadstring</div>
      <div class="code-box">
        <div class="code-header">
          <div class="code-title">
            <span>🔗 Script</span>
          </div>
          <button class="copy-btn" style="width:auto; padding:8px 20px;" onclick="copyScript()" ${script.blurred ? 'disabled' : ''}>Copy</button>
        </div>
        <pre class="code-content">${escapeHtml(script.code)}</pre>
      </div>
      
      ${changelog}
    </div>
    
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">📊 Statistics</div>
        <div class="stat-row"><span>Script ID:</span> <span style="color:#00f2ea">${escapeHtml(script.id.substring(0,12))}...</span></div>
        <div class="stat-row"><span>Uploaded:</span> <span>${script.date ? new Date(script.date).toLocaleDateString() : 'Unknown'}</span></div>
        <div class="stat-row"><span>Last Updated:</span> <span>${script.updated ? new Date(script.updated).toLocaleDateString() : 'Today'}</span></div>
        <div class="stat-row"><span>Key System:</span> <span style="color:${script.keySystem === 'keyless' ? '#00aa00' : '#ffaa00'}">${script.keySystem || 'keyless'}</span></div>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-title">🔄 Related Scripts</div>
        ${relatedHTML}
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-title">📢 Share</div>
        <div style="display:flex; gap:10px;">
          <a href="#" onclick="shareScript('twitter')" style="background:#000; padding:10px; border-radius:50%; display:inline-block;">🐦</a>
          <a href="#" onclick="shareScript('facebook')" style="background:#1877f2; padding:10px; border-radius:50%; display:inline-block;">📘</a>
          <a href="#" onclick="shareScript('reddit')" style="background:#ff4500; padding:10px; border-radius:50%; display:inline-block;">🤖</a>
          <a href="#" onclick="shareScript('copy')" style="background:#00f2ea; padding:10px; border-radius:50%; display:inline-block;">🔗</a>
        </div>
      </div>
    </div>
  `;
}

function copyScript() {
  if (!currentScript) return;
  
  if (currentScript.blurred) {
    showToast('🔒 Verify first to copy!');
    return;
  }
  
  navigator.clipboard.writeText(currentScript.code).then(() => {
    showToast('✅ Script copied!');
    currentScript.downloads = (currentScript.downloads || 0) + 1;
  });
}

function toggleFavorite() {
  if (!currentScript) return;
  
  if (!user.favorites) user.favorites = [];
  
  if (user.favorites.includes(currentScript.id)) {
    user.favorites = user.favorites.filter(id => id !== currentScript.id);
    currentScript.favorites = Math.max(0, (currentScript.favorites || 0) - 1);
    document.querySelector('.favorite-btn').textContent = '☆ Favorite';
    showToast('⭐ Removed from favorites');
  } else {
    user.favorites.push(currentScript.id);
    currentScript.favorites = (currentScript.favorites || 0) + 1;
    document.querySelector('.favorite-btn').textContent = '★ Favorited';
    showToast('❤️ Added to favorites');
  }
  
  localStorage.setItem('user', JSON.stringify(user));
}

function reportScript() {
  window.location.href = `mailto:admin@lokus-hub.com?subject=Report Script: ${currentScript.name}&body=Script ID: ${currentScript.id}`;
}

function shareScript(platform) {
  const url = window.location.href;
  const text = `Check out this script: ${currentScript.name}`;
  
  const shareUrls = {
    twitter: `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,
    facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,
    reddit: `https://www.reddit.com/submit?url=${encodeURIComponent(url)}&title=${encodeURIComponent(text)}`,
    copy: () => {
      navigator.clipboard.writeText(url).then(() => showToast('🔗 Link copied!'));
      return;
    }
  };
  
  if (platform === 'copy') {
    shareUrls.copy();
  } else {
    window.open(shareUrls[platform], '_blank');
  }
}

loadScript();
</script></body></html>
