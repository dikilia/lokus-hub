<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Script - lokus hub</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;line-height:1.6}.container{max-width:1200px;margin:0 auto;padding:20px}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:15px;border-bottom:1px solid #2a2a2a}.logo{font-size:1.5rem;font-weight:bold;color:#00f2ea;text-decoration:none}.nav{display:flex;gap:20px}.nav a{color:#aaa;text-decoration:none}.nav a:hover{color:#00f2ea}.debug-panel{background:#1a1a1a;border:2px solid #00f2ea;border-radius:12px;padding:20px;margin-bottom:30px;font-family:monospace}.debug-title{color:#00f2ea;font-size:1.2rem;margin-bottom:15px}.debug-content{background:#0a0a0a;padding:15px;border-radius:8px;color:#0f0;overflow-x:auto;white-space:pre-wrap;word-break:break-all}.error-box{background:#ff444420;border:2px solid #ff4444;border-radius:12px;padding:20px;margin-bottom:30px;color:#ff4444}.back-btn{display:inline-block;margin-bottom:20px;color:#00f2ea;text-decoration:none}.back-btn:hover{text-decoration:underline}.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#00f2ea;color:#000;padding:12px 30px;border-radius:50px;z-index:9999;display:none;font-weight:bold}.toast.show{display:block;animation:slideUp .3s,fadeOut .3s 2s forwards}@keyframes slideUp{from{bottom:-50px}to{bottom:30px}}@keyframes fadeOut{to{opacity:0}}
</style></head><body>
<div class="container">
  <div class="header">
    <a href="/" class="logo">lokus hub</a>
    <div class="nav">
      <a href="/">Home</a>
      <a href="/admin.html">Admin</a>
    </div>
  </div>

  <a href="/" class="back-btn">← Back to home</a>
  
  <div class="debug-panel">
    <div class="debug-title">🔍 Debug Information</div>
    <div class="debug-content" id="debugOutput">
      Loading debug info...
    </div>
  </div>

  <div id="scriptDisplay" style="display:none;">
    <!-- Script will be displayed here if found -->
  </div>
</div>

<div class="toast" id="toast">📋 Copied!</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const scriptId = urlParams.get('id');
const debugEl = document.getElementById('debugOutput');
let debugLog = [];

function addDebug(message, type = 'info') {
  const timestamp = new Date().toLocaleTimeString();
  const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : '📌';
  debugLog.push(`[${timestamp}] ${prefix} ${message}`);
  debugEl.innerHTML = debugLog.join('<br>');
  console.log(message);
}

async function debugScript() {
  try {
    addDebug(`Script ID from URL: ${scriptId || 'MISSING'}`);
    
    if (!scriptId) {
      addDebug('No script ID provided in URL', 'error');
      addDebug('URL should be: /script.html?id=YOUR-SCRIPT-ID');
      return;
    }
    
    // Test 1: Try to fetch scripts.json
    addDebug('Attempting to fetch /scripts.json...');
    const response = await fetch('/scripts.json?t=' + Date.now());
    
    addDebug(`Response status: ${response.status} ${response.statusText}`);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    
    // Get raw text first
    const rawText = await response.text();
    addDebug(`Raw JSON length: ${rawText.length} characters`);
    addDebug(`First 100 chars: ${rawText.substring(0, 100)}`);
    
    // Try to parse JSON
    let data;
    try {
      data = JSON.parse(rawText);
      addDebug('✅ JSON parsed successfully', 'success');
    } catch (e) {
      addDebug(`JSON parse error: ${e.message}`, 'error');
      return;
    }
    
    // Check structure
    addDebug(`Data type: ${typeof data}`);
    addDebug(`Keys: ${Object.keys(data).join(', ')}`);
    
    if (!data.scripts) {
      addDebug('❌ No "scripts" array found in data', 'error');
      return;
    }
    
    addDebug(`✅ Found scripts array with ${data.scripts.length} items`, 'success');
    
    // List all script IDs
    addDebug('Available script IDs:');
    data.scripts.forEach((s, i) => {
      addDebug(`  ${i+1}. ${s.id || 'NO ID'} - ${s.name || 'Unnamed'}`);
    });
    
    // Find our script
    const script = data.scripts.find(s => s && s.id === scriptId);
    
    if (script) {
      addDebug(`✅ FOUND SCRIPT: ${script.name}`, 'success');
      addDebug(`Author: ${script.author || 'Unknown'}`);
      addDebug(`Game: ${script.game || 'Unknown'}`);
      addDebug(`Blurred: ${script.blurred ? 'Yes' : 'No'}`);
      addDebug(`Code length: ${script.code?.length || 0} characters`);
      
      // Show full script data
      addDebug('Full script data:');
      addDebug(JSON.stringify(script, null, 2));
      
    } else {
      addDebug(`❌ Script with ID "${scriptId}" NOT FOUND`, 'error');
    }
    
  } catch (error) {
    addDebug(`ERROR: ${error.message}`, 'error');
  }
}

// Run debug
debugScript();

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
</script></body></html>
