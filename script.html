<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Script - lokus hub</title><style>
/* Keep your existing CSS - it's fine */
</style></head><body>
<div class="container">
  <div class="header">
    <a href="/" class="logo">lokus hub</a>
    <div class="nav">
      <a href="/">Home</a>
      <a href="/admin.html">Admin</a>
    </div>
  </div>

  <a href="/" class="back-btn">← Back to scripts</a>
  
  <div id="scriptContent">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div style="color:#00f2ea">Loading script...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast">📋 Copied!</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const scriptId = urlParams.get('id');

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

async function loadScript() {
  try {
    if (!scriptId) {
      window.location.href = '/';
      return;
    }

    // Fetch via API instead of direct JSON
    const response = await fetch(`/api/script?id=${scriptId}`);
    
    if (!response.ok) {
      throw new Error(`Script not found (${response.status})`);
    }
    
    const data = await response.json();
    const script = data.script; // ScriptBlox-style response
    
    document.title = `${script.title} - lokus hub`;
    
    // Increment view count (call tracking API)
    fetch(`/api/track-view?id=${scriptId}`, { method: 'POST' }).catch(() => {});
    
    renderScript(script);
    
  } catch (error) {
    document.getElementById('scriptContent').innerHTML = `
      <div class="error-box">
        <h2>❌ Error</h2>
        <p>${error.message}</p>
        <a href="/">← Back to Home</a>
      </div>
    `;
  }
}

function renderScript(script) {
  const user = JSON.parse(localStorage.getItem('user') || '{"favorites":[]}');
  const isFavorited = user.favorites?.includes(script._id);
  
  // Features
  const features = script.features?.length ? 
    `<div class="features-list">${
      script.features.map(f => `<span class="feature-tag">${f}</span>`).join('')
    }</div>` : '';

  // Game link
  const gameLink = script.universeId ? `https://www.roblox.com/games/${script.universeId}` : '#';
  
  // Author avatar
  const authorAvatar = script.owner?.profilePicture || 'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2245%22%20height%3D%2245%22%3E%3Ccircle%20cx%3D%2222.5%22%20cy%3D%2222.5%22%20r%3D%2222.5%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2212%22%20y%3D%2230%22%20fill%3D%22%2300f2ea%22%20font-size%3D%2220%22%3E👤%3C%2Ftext%3E%3C%2Fsvg%3E';
  
  // Script icon
  const scriptIcon = script.game?.imageUrl || 'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2280%22%20height%3D%2280%22%3E%3Crect%20width%3D%2280%22%20height%3D%2280%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2220%22%20y%3D%2250%22%20fill%3D%22%2300f2ea%22%20font-size%3D%2230%22%3E📜%3C%2Ftext%3E%3C%2Fsvg%3E';

  document.getElementById('scriptContent').innerHTML = `
    <div class="script-container">
      <div class="script-main">
        <div class="script-header">
          <img class="script-icon" src="${scriptIcon}" alt="icon">
          <div class="script-info">
            <h1 class="script-title">${escapeHtml(script.title)}</h1>
            <div class="script-meta">
              <span>🎮 ${escapeHtml(script.game?.name || 'Unknown')}</span>
              <span>📦 v${script.version || '1.0.0'}</span>
              <span>🕒 ${new Date(script.createdAt).toLocaleDateString()}</span>
            </div>
          </div>
        </div>
        
        ${script.blurred ? '<div class="blurred-notice">🔒 Requires verification</div>' : ''}
        
        <div class="author-section">
          <img class="author-avatar" src="${authorAvatar}" alt="author">
          <div>
            <span class="author-name">${escapeHtml(script.owner?.username || 'Anonymous')}</span>
          </div>
        </div>
        
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-value">${script.downloads || 0}</div><div class="stat-label">Downloads</div></div>
          <div class="stat-card"><div class="stat-value">${script.likes || 0}</div><div class="stat-label">Likes</div></div>
          <div class="stat-card"><div class="stat-value">${script.views || 0}</div><div class="stat-label">Views</div></div>
        </div>
        
        <div class="action-buttons">
          <button class="copy-btn" onclick="copyScript()" ${script.blurred ? 'disabled' : ''}>📋 Copy Script</button>
          <button class="favorite-btn" onclick="toggleFavorite('${script._id}')">${isFavorited ? '★ Favorited' : '☆ Favorite'}</button>
        </div>
        
        <div class="game-links">
          <a href="${gameLink}" target="_blank" class="game-link">🎮 Play Game</a>
          <a href="/api/script/raw?id=${script._id}" target="_blank" class="game-link">⚡ Raw Code</a>
        </div>
        
        <div class="section-title">📝 Description</div>
        <div class="description-box">
          <div class="description-content">${escapeHtml(script.description || 'No description')}</div>
        </div>
        
        ${features}
        
        <div class="section-title">💻 Loadstring</div>
        <div class="code-box">
          <div class="code-header">
            <span>🔗 Script Code</span>
            <button class="copy-btn" style="width:auto; padding:8px 20px;" onclick="copyScript()" ${script.blurred ? 'disabled' : ''}>Copy</button>
          </div>
          <pre class="code-content">${escapeHtml(script.code)}</pre>
        </div>
      </div>
    </div>
  `;
  
  window.currentScript = script;
}

function copyScript() {
  if (!window.currentScript) return;
  
  if (window.currentScript.blurred) {
    showToast('🔒 Verify first to copy!');
    return;
  }
  
  navigator.clipboard.writeText(window.currentScript.code).then(() => {
    showToast('✅ Script copied!');
    // Track download via API
    fetch(`/api/track-download?id=${window.currentScript._id}`, { method: 'POST' }).catch(() => {});
  });
}

function toggleFavorite(scriptId) {
  const user = JSON.parse(localStorage.getItem('user') || '{"favorites":[]}');
  
  if (user.favorites.includes(scriptId)) {
    user.favorites = user.favorites.filter(id => id !== scriptId);
    document.querySelector('.favorite-btn').textContent = '☆ Favorite';
    showToast('⭐ Removed');
  } else {
    user.favorites.push(scriptId);
    document.querySelector('.favorite-btn').textContent = '★ Favorited';
    showToast('❤️ Added');
  }
  
  localStorage.setItem('user', JSON.stringify(user));
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

loadScript();
</script></body></html>
